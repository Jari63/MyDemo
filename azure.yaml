# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

# Name of the application.
name: clean-architecture-azd
services:
  web:
    language: csharp
    project: ./src/Web
    host: appservice
hooks:
  postdeploy:
    shell: sh
    run: |
      export ConnectionStrings__MyDemoDb="$SQLAZURECONNECTIONSTRING"
      dotnet run --project src/TestDataGen
